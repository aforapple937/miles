<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Miles">
<meta name="theme-color" content="#0A1A2F">
<title>KrisFlyer Miles</title>
<style>
  :root{
    --bg:#0A1A2F;
    --panel:#10233E;
    --panel-2:#0E2036;
    --gold:#D4AF62;
    --gold-bright:#EAC87C;
    --text:#EAF0F7;
    --muted:#89A0BD;
    --line:rgba(255,255,255,.08);
    --perf:rgba(212,175,98,.30);
    --danger:#E58C7C;
    --num:"SFMono-Regular",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(212,175,98,.10), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    padding:
      calc(env(safe-area-inset-top) + 22px)
      16px
      calc(env(safe-area-inset-bottom) + 40px);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:460px;margin:0 auto}

  /* Departures-board total */
  .board{
    position:relative;
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);
    border-radius:20px;
    padding:26px 24px 24px;
    overflow:hidden;
  }
  .board::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(80% 120% at 50% 0%, rgba(212,175,98,.14), transparent 55%);
    pointer-events:none;
  }
  .board-label{
    font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);
  }
  .board-total{
    font-family:var(--num);
    font-size:clamp(46px,15vw,66px);
    font-weight:600;line-height:1.02;letter-spacing:.02em;
    color:var(--gold-bright);
    margin:6px 0 2px;
    font-variant-numeric:tabular-nums;
    text-shadow:0 0 30px rgba(212,175,98,.25);
  }
  .board-sub{font-size:12.5px;color:var(--muted)}
  .board-sub b{color:var(--text);font-weight:600}

  .section-head{
    display:flex;align-items:center;justify-content:space-between;
    margin:26px 6px 10px;
  }
  .section-head h2{
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--muted);font-weight:600;margin:0;
  }

  /* Boarding-pass card row */
  .stub{
    display:flex;align-items:stretch;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    margin-bottom:10px;
    overflow:hidden;
    transition:border-color .2s;
  }
  .stub:focus-within{border-color:rgba(212,175,98,.45)}
  .stub-main{flex:1;padding:13px 14px;min-width:0}
  .name{
    width:100%;background:transparent;border:none;color:var(--text);
    font-size:16px;font-weight:600;padding:2px 0;
    border-bottom:1px solid transparent;outline:none;
  }
  .name:focus{border-bottom-color:var(--perf)}
  .rate-line{
    display:flex;align-items:center;gap:6px;margin-top:8px;
    font-size:13px;color:var(--muted);
  }
  .rate-line .x{color:var(--gold);opacity:.7}
  .num-in{
    background:rgba(255,255,255,.05);
    border:1px solid var(--line);border-radius:8px;
    color:var(--text);font-family:var(--num);font-size:15px;
    padding:6px 8px;outline:none;min-width:0;
    font-variant-numeric:tabular-nums;
  }
  .num-in:focus{border-color:var(--perf)}
  .pts{width:96px}
  .rate{width:64px}
  .unit{font-size:11.5px}

  .stub-mi{
    width:104px;flex:none;
    border-left:1.5px dashed var(--perf);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:8px;gap:2px;
    position:relative;
  }
  .mi-num{
    font-family:var(--num);font-size:19px;font-weight:600;color:var(--gold-bright);
    font-variant-numeric:tabular-nums;text-align:center;line-height:1.1;
    word-break:break-all;
  }
  .mi-lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  .del{
    position:absolute;top:5px;right:6px;
    width:22px;height:22px;border-radius:50%;
    background:transparent;border:none;color:var(--muted);
    font-size:16px;line-height:1;cursor:pointer;opacity:.55;
  }
  .del:hover,.del:focus-visible{opacity:1;color:var(--danger);outline:none}

  .add{
    width:100%;margin-top:4px;
    background:transparent;border:1.5px dashed var(--perf);
    color:var(--gold);border-radius:14px;
    padding:14px;font-size:14px;font-weight:600;letter-spacing:.03em;
    cursor:pointer;transition:background .2s;
  }
  .add:hover,.add:focus-visible{background:rgba(212,175,98,.08);outline:none}

  .note{
    margin:22px 6px 0;font-size:11.5px;line-height:1.6;color:var(--muted);
  }
  .note b{color:#B9CADF;font-weight:600}

  /* View switch */
  .switch{
    display:flex;gap:4px;margin:0 4px 20px;padding:4px;
    background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
  }
  .switch button{
    flex:1;background:transparent;border:none;border-radius:8px;
    color:var(--muted);font-size:13px;font-weight:600;letter-spacing:.02em;
    padding:9px 8px;cursor:pointer;transition:background .18s,color .18s;
  }
  .switch button[aria-selected="true"]{
    background:linear-gradient(180deg,rgba(212,175,98,.20),rgba(212,175,98,.10));
    color:var(--gold-bright);
  }
  [hidden]{display:none!important}

  /* Advisor */
  .adv-q{font-size:19px;font-weight:600;color:var(--text);margin:2px 2px 16px;line-height:1.3}
  .adv-opts{display:flex;flex-direction:column;gap:9px}
  .opt{
    display:block;width:100%;text-align:left;cursor:pointer;
    background:var(--panel);border:1px solid var(--line);border-radius:13px;
    padding:14px 15px;transition:border-color .18s,background .18s;
  }
  .opt:hover,.opt:focus-visible{border-color:rgba(212,175,98,.45);background:rgba(212,175,98,.05);outline:none}
  .opt-t{font-size:15px;font-weight:600;color:var(--text)}

  .trail{display:flex;flex-wrap:wrap;gap:7px;margin:0 2px 18px}
  .chip{
    display:inline-flex;align-items:center;gap:6px;cursor:pointer;
    background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:999px;
    padding:6px 11px;font-size:12px;color:var(--text);transition:border-color .18s;
  }
  .chip:hover,.chip:focus-visible{border-color:var(--perf);outline:none}
  .chip .k{color:var(--muted)}
  .chip .e{color:var(--gold);font-size:11px}

  .res-head{
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);
    font-weight:600;margin:2px 2px 12px;
  }
  .res-card{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:var(--panel);border:1px solid var(--line);border-radius:13px;
    padding:14px 15px;margin-bottom:9px;
  }
  .res-name{font-size:15.5px;font-weight:600;color:var(--text)}
  .res-why{font-size:12px;color:var(--muted);margin-top:3px}
  .res-mpd{
    flex:none;font-family:var(--num);font-weight:600;color:var(--gold-bright);
    font-size:15px;text-align:right;line-height:1.1;
  }
  .res-mpd small{display:block;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:400}
  .res-empty{
    background:var(--panel);border:1px dashed var(--line);border-radius:13px;
    padding:18px 16px;color:var(--muted);font-size:13.5px;line-height:1.5;
  }
  .res-empty b{color:var(--text)}
  .restart{
    width:100%;margin-top:14px;
    background:transparent;border:1.5px dashed var(--perf);
    color:var(--gold);border-radius:13px;padding:13px;font-size:14px;font-weight:600;
    cursor:pointer;transition:background .18s;
  }
  .restart:hover,.restart:focus-visible{background:rgba(212,175,98,.08);outline:none}

  :focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <div class="switch" role="tablist" aria-label="View">
    <button id="tab-calc" role="tab" aria-selected="true" aria-controls="view-calc">Calculator</button>
    <button id="tab-adv" role="tab" aria-selected="false" aria-controls="view-advisor">Which card?</button>
  </div>

  <section id="view-calc" role="tabpanel" aria-labelledby="tab-calc">
    <div class="board">
      <div class="board-label">Total KrisFlyer miles</div>
      <div class="board-total" id="total">0</div>
      <div class="board-sub">across <b id="count">0</b> <span id="cardword">cards</span></div>
    </div>

    <div class="section-head">
      <h2>Your cards</h2>
    </div>

    <div id="list"></div>

    <button class="add" id="add">+ Add a card</button>
  </section>

  <section id="view-advisor" role="tabpanel" aria-labelledby="tab-adv" hidden>
    <div class="board">
      <div id="advisor-body"></div>
    </div>
  </section>

</div>

<script>
(function(){
  "use strict";
  var KEY = "krisflyer_calc_v1";
  var mem = null; // fallback store when localStorage is blocked (e.g. inside previews)

  var DEFAULTS = [
    {name:"KrisFlyer (miles held)", points:0, rate:1},
    {name:"DBS Points",            points:0, rate:2},
    {name:"Citi Miles",            points:0, rate:1},
    {name:"Citi ThankYou",         points:0, rate:0.4},
    {name:"UNI$",                  points:0, rate:2},
    {name:"Maybank TREATS",        points:0, rate:0.4}
  ];

  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

  function load(){
    try{ var s = localStorage.getItem(KEY); if(s) return JSON.parse(s); }catch(e){}
    if(mem) return mem;
    return null;
  }
  function save(){
    try{ localStorage.setItem(KEY, JSON.stringify(cards)); }catch(e){ mem = cards; }
  }

  var cards = (load() || DEFAULTS.map(function(d){ return {id:uid(), name:d.name, points:d.points, rate:d.rate}; }));

  var fmt = new Intl.NumberFormat("en-US");
  function milesFor(c){
    var p = parseFloat(c.points)||0, r = parseFloat(c.rate)||0;
    return Math.floor(p*r);
  }
  function total(){ return cards.reduce(function(s,c){ return s+milesFor(c); },0); }

  var listEl  = document.getElementById("list");
  var totalEl = document.getElementById("total");
  var countEl = document.getElementById("count");
  var cardWord= document.getElementById("cardword");

  var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches;
  var shown = 0, raf = null;
  function animateTotal(to){
    countEl.textContent = cards.length;
    cardWord.textContent = cards.length===1 ? "card" : "cards";
    if(reduce){ shown=to; totalEl.textContent=fmt.format(to); return; }
    var from = shown, start = null, dur = 480;
    if(raf) cancelAnimationFrame(raf);
    function step(t){
      if(start===null) start=t;
      var k = Math.min(1,(t-start)/dur);
      var e = 1-Math.pow(1-k,3);
      var val = Math.round(from+(to-from)*e);
      totalEl.textContent = fmt.format(val);
      if(k<1) raf=requestAnimationFrame(step); else { shown=to; }
    }
    raf = requestAnimationFrame(step);
  }

  function refreshTotals(){
    // update each visible miles figure without full re-render (keeps input focus)
    var nodes = listEl.querySelectorAll("[data-mi]");
    cards.forEach(function(c,i){
      if(nodes[i]) nodes[i].textContent = fmt.format(milesFor(c));
    });
    animateTotal(total());
  }

  function render(){
    listEl.innerHTML = "";
    cards.forEach(function(c){
      var row = document.createElement("div");
      row.className = "stub";
      row.innerHTML =
        '<div class="stub-main">'+
          '<input class="name" value="" aria-label="Card name">'+
          '<div class="rate-line">'+
            '<input class="num-in pts" inputmode="numeric" value="" aria-label="Points balance">'+
            '<span class="unit">pts</span>'+
            '<span class="x">×</span>'+
            '<input class="num-in rate" inputmode="decimal" value="" aria-label="Miles per point">'+
            '<span class="unit">mi/pt</span>'+
          '</div>'+
        '</div>'+
        '<div class="stub-mi">'+
          '<button class="del" aria-label="Remove card">×</button>'+
          '<div class="mi-num" data-mi>0</div>'+
          '<div class="mi-lbl">miles</div>'+
        '</div>';

      var nameI = row.querySelector(".name");
      var ptsI  = row.querySelector(".pts");
      var rateI = row.querySelector(".rate");
      var miEl  = row.querySelector("[data-mi]");
      nameI.value = c.name;
      ptsI.value  = c.points ? c.points : "";
      rateI.value = c.rate;
      miEl.textContent = fmt.format(milesFor(c));

      nameI.addEventListener("input", function(){ c.name=nameI.value; save(); });
      ptsI.addEventListener("input", function(){
        c.points = ptsI.value.replace(/[^0-9.]/g,"");
        save(); refreshTotals();
      });
      rateI.addEventListener("input", function(){
        c.rate = rateI.value.replace(/[^0-9.]/g,"");
        save(); refreshTotals();
      });
      row.querySelector(".del").addEventListener("click", function(){
        cards = cards.filter(function(x){ return x!==c; });
        save(); render(); animateTotal(total());
      });

      listEl.appendChild(row);
    });
    animateTotal(total());
  }

  document.getElementById("add").addEventListener("click", function(){
    cards.push({id:uid(), name:"New card", points:0, rate:1});
    save(); render();
    var names = listEl.querySelectorAll(".name");
    var last = names[names.length-1];
    if(last){ last.focus(); last.select(); }
  });

  render();
})();
</script>

<script>
/* ---- View switch ---- */
(function(){
  "use strict";
  var tabs = {
    calc: {btn:document.getElementById("tab-calc"), view:document.getElementById("view-calc")},
    adv:  {btn:document.getElementById("tab-adv"),  view:document.getElementById("view-advisor")}
  };
  function show(which){
    Object.keys(tabs).forEach(function(k){
      var t = tabs[k], on = (k===which);
      t.btn.setAttribute("aria-selected", on ? "true" : "false");
      t.view.hidden = !on;
    });
  }
  tabs.calc.btn.addEventListener("click", function(){ show("calc"); });
  tabs.adv.btn.addEventListener("click", function(){ show("adv"); });
})();

/* ---- "Which card?" advisor ---- */
(function(){
  "use strict";

  // Each card earns 4 mpd exactly when earns(a) is true, given the answered
  // attributes a = {channel, fcy, category}. Rules derived from the reference.
  var CARDS = [
    { id:"dbsw", name:"DBS Woman's World",
      earns:function(a){ return a.channel==="online_card" || a.channel==="online_wallet"; },
      why:function(){ return "Online spend (incl. in-app Apple Pay)"; } },
    { id:"citi", name:"Citi Rewards",
      earns:function(a){ return a.channel==="online_card" && a.category!=="travel"; },
      why:function(){ return "Online spend (excludes travel & in-app wallet)"; } },
    { id:"xl", name:"Maybank XL Rewards",
      earns:function(a){ return a.fcy===true || ["dining","shopping","travel","entertainment"].indexOf(a.category)>=0; },
      why:function(a){ return a.fcy ? "Foreign-currency spend" : ("SGD "+a.category); } },
    { id:"lady", name:"UOB Lady's / Solitaire",
      earns:function(a){ return a.category==="travel" || a.category==="dining"; },
      why:function(a){ return a.category==="travel" ? "Travel" : "Dining"; } },
    { id:"pref", name:"UOB Preferred Visa",
      earns:function(a){ return a.channel==="instore_contactless"; },
      why:function(){ return "In-store contactless (tap)"; } },
    { id:"vs", name:"UOB Visa Signature",
      earns:function(a){ return a.fcy===true || a.channel==="instore_contactless"; },
      why:function(a){ return a.fcy ? "Foreign-currency spend" : "SGD contactless"; } }
  ];

  var ATTRS = [
    { key:"channel", q:"How are you paying?", options:[
      {val:"online_card",        label:"Online"},
      {val:"online_wallet",      label:"Apple Pay"},
      {val:"instore_contactless",label:"Contactless"}
    ]},
    { key:"fcy", q:"What currency is it charged in?", options:[
      {val:false, label:"SGD"},
      {val:true,  label:"Foreign currency"}
    ]},
    { key:"category", q:"What are you buying?", options:[
      {val:"travel",        label:"Travel"},
      {val:"dining",        label:"Dining"},
      {val:"shopping",      label:"Shopping"},
      {val:"entertainment", label:"Entertainment"},
      {val:"other",         label:"Something else"}
    ]}
  ];

  var answers = {};   // key -> value
  var order   = [];   // keys in the order they were answered

  function attrByKey(k){ for(var i=0;i<ATTRS.length;i++){ if(ATTRS[i].key===k) return ATTRS[i]; } return null; }
  function optLabel(attr,val){
    for(var i=0;i<attr.options.length;i++){ if(attr.options[i].val===val) return attr.options[i].label; }
    return String(val);
  }

  // All full attribute assignments consistent with the current answers.
  function completions(ans){
    var res = [{}];
    ATTRS.forEach(function(attr){
      var vals = (attr.key in ans) ? [ans[attr.key]] : attr.options.map(function(o){ return o.val; });
      var next = [];
      res.forEach(function(base){
        vals.forEach(function(v){
          var c = {}; for(var kk in base) c[kk]=base[kk]; c[attr.key]=v; next.push(c);
        });
      });
      res = next;
    });
    return res;
  }

  // "yes" = earns under every consistent completion, "no" = never, "maybe" = depends.
  function cardStatus(card, ans){
    var comps = completions(ans), t=0, f=0;
    comps.forEach(function(a){ if(card.earns(a)) t++; else f++; });
    if(t>0 && f===0) return "yes";
    if(f>0 && t===0) return "no";
    return "maybe";
  }
  function undetermined(ans){ return CARDS.filter(function(c){ return cardStatus(c,ans)==="maybe"; }); }

  // Pick the still-unanswered attribute that resolves the most undetermined cards.
  function pickAttr(ans){
    var open = undetermined(ans);
    if(open.length===0) return null;
    var best=null, bestScore=-1;
    ATTRS.forEach(function(attr){
      if(attr.key in ans) return;
      var total=0;
      attr.options.forEach(function(o){
        var ans2={}; for(var kk in ans) ans2[kk]=ans[kk]; ans2[attr.key]=o.val;
        total += (open.length - undetermined(ans2).length);
      });
      var score = total/attr.options.length;
      if(score>bestScore){ bestScore=score; best=attr; }
    });
    // Fallback: nothing scored, but cards remain undetermined — ask the first open attr.
    if(!best || bestScore<=0){
      for(var i=0;i<ATTRS.length;i++){ if(!(ATTRS[i].key in ans)) return ATTRS[i]; }
    }
    return best;
  }

  var body = document.getElementById("advisor-body");

  function answer(key,val){
    answers[key]=val;
    if(order.indexOf(key)<0) order.push(key);
    render();
  }
  function editFrom(key){
    var i = order.indexOf(key);
    if(i<0) return;
    var removed = order.splice(i);
    removed.forEach(function(k){ delete answers[k]; });
    render(key);
  }
  function restart(){ answers={}; order=[]; render(); }

  function renderTrail(){
    if(order.length===0) return null;
    var wrap = document.createElement("div");
    wrap.className = "trail";
    order.forEach(function(k){
      var attr = attrByKey(k);
      var chip = document.createElement("button");
      chip.className = "chip";
      chip.type = "button";
      chip.innerHTML = '<span class="k">'+attr.q.replace(/\?.*/,"").split(" ").slice(0,3).join(" ")+
        ':</span> '+optLabel(attr, answers[k])+' <span class="e">edit</span>';
      chip.setAttribute("aria-label", "Change: "+optLabel(attr, answers[k]));
      chip.addEventListener("click", function(){ editFrom(k); });
      wrap.appendChild(chip);
    });
    return wrap;
  }

  function renderQuestion(attr){
    var frag = document.createDocumentFragment();
    var h = document.createElement("div");
    h.className = "adv-q";
    h.textContent = attr.q;
    frag.appendChild(h);
    var opts = document.createElement("div");
    opts.className = "adv-opts";
    attr.options.forEach(function(o){
      var b = document.createElement("button");
      b.className = "opt";
      b.type = "button";
      b.innerHTML = '<span class="opt-t">'+o.label+'</span>';
      b.addEventListener("click", function(){ answer(attr.key, o.val); });
      opts.appendChild(b);
    });
    frag.appendChild(opts);
    return frag;
  }

  function renderResult(){
    var frag = document.createDocumentFragment();
    var eligible = CARDS.filter(function(c){ return cardStatus(c,answers)==="yes"; });

    var head = document.createElement("div");
    head.className = "res-head";
    head.textContent = eligible.length ? "Use any of these — 4 mpd" : "No bonus here";
    frag.appendChild(head);

    if(eligible.length===0){
      var empty = document.createElement("div");
      empty.className = "res-empty";
      empty.innerHTML = "<b>No card earns 4 mpd bonus miles for this.</b> Use your everyday base card.";
      frag.appendChild(empty);
    } else {
      eligible.forEach(function(c){
        var row = document.createElement("div");
        row.className = "res-card";
        row.innerHTML =
          '<div>'+
            '<div class="res-name">'+c.name+'</div>'+
            '<div class="res-why">'+c.why(answers)+'</div>'+
          '</div>'+
          '<div class="res-mpd">4.0<small>mpd</small></div>';
        frag.appendChild(row);
      });
    }

    var again = document.createElement("button");
    again.className = "restart";
    again.type = "button";
    again.textContent = "Start over";
    again.addEventListener("click", restart);
    frag.appendChild(again);
    return frag;
  }

  function render(){
    body.innerHTML = "";
    var trail = renderTrail();
    if(trail) body.appendChild(trail);
    var next = pickAttr(answers);
    body.appendChild(next ? renderQuestion(next) : renderResult());
  }

  render();
})();
