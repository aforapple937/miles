<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Miles">
<meta name="theme-color" content="#F4F6FA">
<title>KrisFlyer Miles</title>
<style>
  :root{
    --bg:#F4F6FA;
    --surface:#FFFFFF;
    --ink:#101D2E;
    --ink-2:#647587;
    --line:#E6EAF1;
    --gold:#B0821E;
    --gold-bright:#EAC87C;
    --gold-tint:#FFF9EE;
    --gold-soft:#EBD9B0;
    --navy:#0E1B2C;
    --danger:#E4573D;
    --shadow-sm:0 1px 2px rgba(16,29,46,.06),0 2px 6px rgba(16,29,46,.05);
    --shadow-md:0 6px 18px rgba(16,29,46,.10);
    --shadow-lg:0 14px 34px rgba(16,29,46,.16);
    --num:"SFMono-Regular",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    padding:
      calc(env(safe-area-inset-top) + 20px)
      16px
      calc(env(safe-area-inset-bottom) + 40px);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:440px;margin:0 auto}

  /* Segmented tab bar — icons only */
  .switch{
    display:flex;gap:5px;background:#E7EAF1;border-radius:15px;padding:5px;
    margin:0 0 22px;
  }
  .switch button{
    flex:1;display:flex;align-items:center;justify-content:center;
    border:none;background:transparent;border-radius:11px;padding:11px;
    color:var(--ink-2);cursor:pointer;
    transition:background .2s,color .2s,box-shadow .2s;
  }
  .switch button svg{width:23px;height:23px;display:block}
  .switch button[aria-selected="true"]{
    background:var(--surface);color:var(--navy);box-shadow:var(--shadow-sm);
  }
  .switch button:active{color:var(--navy)}
  [hidden]{display:none!important}

  /* Hero board (calculator) */
  .board{
    position:relative;overflow:hidden;
    background:linear-gradient(140deg,#1A2E48 0%,#0E1B2C 72%);
    border-radius:22px;padding:24px 24px 22px;color:#fff;
    box-shadow:var(--shadow-md);
  }
  .board::before{
    content:"";position:absolute;right:-40px;top:-60px;width:210px;height:210px;
    background:radial-gradient(circle,rgba(234,200,124,.22),transparent 70%);
    pointer-events:none;
  }
  .board-label{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#93A6BE}
  .board-total{
    font-family:var(--num);font-size:clamp(44px,14vw,62px);font-weight:600;
    line-height:1.04;letter-spacing:.01em;color:var(--gold-bright);
    margin:8px 0 4px;font-variant-numeric:tabular-nums;
    text-shadow:0 2px 22px rgba(234,200,124,.28);
  }
  .board-sub{font-size:12.5px;color:#93A6BE}
  .board-sub b{color:#fff;font-weight:600}

  .section-head{margin:24px 4px 12px}
  .section-head h2{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-2);
    font-weight:700;margin:0;
  }

  /* Card rows — swipe right to reveal Delete */
  .stub-wrap{
    position:relative;margin-bottom:11px;border-radius:16px;overflow:hidden;
    box-shadow:var(--shadow-sm);
  }
  .stub-delete{
    position:absolute;left:0;top:0;bottom:0;width:96px;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#EA6248,#D6442B);color:#fff;
    border:none;font-size:14px;font-weight:700;letter-spacing:.02em;cursor:pointer;
  }
  .stub-delete:active{filter:brightness(.94)}
  .stub{
    display:flex;align-items:stretch;position:relative;z-index:1;
    background:var(--surface);border:1px solid var(--line);border-radius:16px;
    overflow:hidden;transform:translateX(0);touch-action:pan-y;
    transition:border-color .2s;
  }
  .stub:focus-within{border-color:var(--gold-soft)}
  .stub-main{flex:1;padding:14px 15px;min-width:0}
  .name{
    width:100%;background:transparent;border:none;color:var(--ink);
    font-size:16px;font-weight:600;padding:2px 0;
    border-bottom:1px solid transparent;outline:none;
  }
  .name:focus{border-bottom-color:var(--gold-soft)}
  .rate-line{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:13px;color:var(--ink-2)}
  .rate-line .x{color:var(--gold);opacity:.8}
  .num-in{
    background:#F3F5F9;border:1px solid var(--line);border-radius:9px;
    color:var(--ink);font-family:var(--num);font-size:15px;padding:7px 9px;outline:none;
    min-width:0;font-variant-numeric:tabular-nums;
  }
  .num-in:focus{border-color:var(--gold-soft);background:#fff}
  .pts{width:92px}.rate{width:62px}.unit{font-size:11.5px;color:var(--ink-2)}
  .stub-mi{
    width:100px;flex:none;border-left:1.5px dashed var(--gold-soft);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:8px;gap:3px;background:var(--gold-tint);
  }
  .mi-num{
    font-family:var(--num);font-size:19px;font-weight:700;color:var(--gold);
    font-variant-numeric:tabular-nums;text-align:center;line-height:1.1;word-break:break-all;
  }
  .mi-lbl{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-2)}

  .add{
    width:100%;margin-top:5px;background:var(--surface);
    border:1.5px dashed var(--gold-soft);color:var(--gold);border-radius:16px;
    padding:15px;font-size:14.5px;font-weight:700;letter-spacing:.02em;cursor:pointer;
    box-shadow:var(--shadow-sm);transition:background .2s;
  }
  .add:active{background:var(--gold-tint)}

  /* Advisor — questions */
  .adv-q{
    font-size:22px;font-weight:700;color:var(--ink);
    margin:6px 2px 18px;line-height:1.25;letter-spacing:-.01em;
  }
  .adv-opts{display:flex;flex-direction:column;gap:10px}
  .opt{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    width:100%;text-align:left;cursor:pointer;
    background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:17px 18px;box-shadow:var(--shadow-sm);
    transition:transform .12s,box-shadow .2s,border-color .2s;
  }
  .opt:active{transform:scale(.985);box-shadow:var(--shadow-md)}
  .opt-t{font-size:16px;font-weight:600;color:var(--ink)}
  .opt .chev{width:20px;height:20px;color:#B7C1CD;flex:none}

  .restart{
    width:100%;margin-top:16px;background:transparent;border:none;
    color:var(--ink-2);border-radius:12px;padding:12px;font-size:14px;font-weight:600;
    cursor:pointer;transition:background .2s,color .2s;
  }
  .restart:active{background:#E9ECF2;color:var(--ink)}

  /* Advisor — result (deliberately distinct from the question cards) */
  .res-top{display:flex;align-items:center;gap:13px;margin:4px 2px 18px}
  .res-badge-check{
    width:46px;height:46px;flex:none;border-radius:50%;
    background:linear-gradient(140deg,#EAC87C,#C79A3E);color:#fff;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 16px rgba(199,154,62,.42);
  }
  .res-badge-check svg{width:25px;height:25px}
  .res-title{font-size:19px;font-weight:700;color:var(--ink);line-height:1.2;letter-spacing:-.01em}
  .res-sub{font-size:13px;color:var(--ink-2);margin-top:2px}

  .res-card{
    display:flex;align-items:center;gap:13px;
    background:var(--gold-tint);border:1px solid var(--gold-soft);
    border-radius:15px;padding:16px 17px;margin-bottom:10px;
  }
  .res-dot{
    width:24px;height:24px;flex:none;border-radius:50%;
    background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;
  }
  .res-dot svg{width:15px;height:15px}
  .res-name{font-size:16px;font-weight:700;color:var(--navy)}

  .res-empty{
    display:flex;align-items:center;gap:13px;
    background:var(--surface);border:1px solid var(--line);border-radius:15px;
    padding:18px;box-shadow:var(--shadow-sm);
  }
  .res-empty .ic{
    width:42px;height:42px;flex:none;border-radius:50%;background:#EEF1F6;color:var(--ink-2);
    display:flex;align-items:center;justify-content:center;
  }
  .res-empty .ic svg{width:22px;height:22px}
  .res-empty-t{font-size:15.5px;font-weight:700;color:var(--ink)}
  .res-empty-s{font-size:13px;color:var(--ink-2);margin-top:2px}

  .opt,.add,.restart,.switch button,.stub-delete{
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  }
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <div class="switch" role="tablist" aria-label="View">
    <button id="tab-adv" role="tab" aria-selected="true" aria-controls="view-advisor" aria-label="Which card">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="5" width="19" height="14" rx="3"/><path d="M2.5 9.5h19"/><path d="M6 14.5h4"/></svg>
    </button>
    <button id="tab-calc" role="tab" aria-selected="false" aria-controls="view-calc" aria-label="Calculator">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="2.5" width="15" height="19" rx="3.2"/><rect x="7.6" y="5.4" width="8.8" height="3.4" rx="1.2"/><circle cx="8.4" cy="13" r="1.05" fill="currentColor" stroke="none"/><circle cx="12" cy="13" r="1.05" fill="currentColor" stroke="none"/><circle cx="15.6" cy="13" r="1.05" fill="currentColor" stroke="none"/><circle cx="8.4" cy="17.4" r="1.05" fill="currentColor" stroke="none"/><circle cx="12" cy="17.4" r="1.05" fill="currentColor" stroke="none"/><circle cx="15.6" cy="17.4" r="1.05" fill="currentColor" stroke="none"/></svg>
    </button>
  </div>

  <section id="view-advisor" role="tabpanel" aria-labelledby="tab-adv">
    <div id="advisor-body"></div>
  </section>

  <section id="view-calc" role="tabpanel" aria-labelledby="tab-calc" hidden>
    <div class="board">
      <div class="board-label">Total KrisFlyer miles</div>
      <div class="board-total" id="total">0</div>
      <div class="board-sub">across <b id="count">0</b> <span id="cardword">cards</span></div>
    </div>

    <div class="section-head">
      <h2>Your cards</h2>
    </div>

    <div id="list"></div>

    <button class="add" id="add">+ Add a card</button>
  </section>

</div>

<script>
/* ---- Calculator ---- */
(function(){
  "use strict";
  var KEY = "krisflyer_calc_v1";
  var mem = null; // fallback store when localStorage is blocked (e.g. inside previews)

  var DEFAULTS = [
    {name:"KrisFlyer (miles held)", points:0, rate:1},
    {name:"DBS Points",            points:0, rate:2},
    {name:"Citi Miles",            points:0, rate:1},
    {name:"Citi ThankYou",         points:0, rate:0.4},
    {name:"UNI$",                  points:0, rate:2},
    {name:"Maybank TREATS",        points:0, rate:0.4}
  ];

  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

  function load(){
    try{ var s = localStorage.getItem(KEY); if(s) return JSON.parse(s); }catch(e){}
    if(mem) return mem;
    return null;
  }
  function save(){
    try{ localStorage.setItem(KEY, JSON.stringify(cards)); }catch(e){ mem = cards; }
  }

  var cards = (load() || DEFAULTS.map(function(d){ return {id:uid(), name:d.name, points:d.points, rate:d.rate}; }));

  var fmt = new Intl.NumberFormat("en-US");
  function milesFor(c){
    var p = parseFloat(c.points)||0, r = parseFloat(c.rate)||0;
    return Math.floor(p*r);
  }
  function total(){ return cards.reduce(function(s,c){ return s+milesFor(c); },0); }

  var listEl  = document.getElementById("list");
  var totalEl = document.getElementById("total");
  var countEl = document.getElementById("count");
  var cardWord= document.getElementById("cardword");

  var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches;
  var shown = 0, raf = null;
  function animateTotal(to){
    countEl.textContent = cards.length;
    cardWord.textContent = cards.length===1 ? "card" : "cards";
    if(reduce){ shown=to; totalEl.textContent=fmt.format(to); return; }
    var from = shown, start = null, dur = 480;
    if(raf) cancelAnimationFrame(raf);
    function step(t){
      if(start===null) start=t;
      var k = Math.min(1,(t-start)/dur);
      var e = 1-Math.pow(1-k,3);
      var val = Math.round(from+(to-from)*e);
      totalEl.textContent = fmt.format(val);
      if(k<1) raf=requestAnimationFrame(step); else { shown=to; }
    }
    raf = requestAnimationFrame(step);
  }

  function refreshTotals(){
    // update each visible miles figure without full re-render (keeps input focus)
    var nodes = listEl.querySelectorAll("[data-mi]");
    cards.forEach(function(c,i){
      if(nodes[i]) nodes[i].textContent = fmt.format(milesFor(c));
    });
    animateTotal(total());
  }

  function render(){
    listEl.innerHTML = "";
    cards.forEach(function(c){
      var wrap = document.createElement("div");
      wrap.className = "stub-wrap";
      wrap.innerHTML =
        '<button class="stub-delete" type="button" aria-label="Delete card">Delete</button>'+
        '<div class="stub">'+
          '<div class="stub-main">'+
            '<input class="name" value="" aria-label="Card name">'+
            '<div class="rate-line">'+
              '<input class="num-in pts" inputmode="numeric" value="" aria-label="Points balance">'+
              '<span class="unit">pts</span>'+
              '<span class="x">&times;</span>'+
              '<input class="num-in rate" inputmode="decimal" value="" aria-label="Miles per point">'+
              '<span class="unit">mi/pt</span>'+
            '</div>'+
          '</div>'+
          '<div class="stub-mi">'+
            '<div class="mi-num" data-mi>0</div>'+
            '<div class="mi-lbl">miles</div>'+
          '</div>'+
        '</div>';

      var stub  = wrap.querySelector(".stub");
      var nameI = wrap.querySelector(".name");
      var ptsI  = wrap.querySelector(".pts");
      var rateI = wrap.querySelector(".rate");
      var miEl  = wrap.querySelector("[data-mi]");
      nameI.value = c.name;
      ptsI.value  = c.points ? c.points : "";
      rateI.value = c.rate;
      miEl.textContent = fmt.format(milesFor(c));

      nameI.addEventListener("input", function(){ c.name=nameI.value; save(); });
      ptsI.addEventListener("input", function(){
        c.points = ptsI.value.replace(/[^0-9.]/g,"");
        save(); refreshTotals();
      });
      rateI.addEventListener("input", function(){
        c.rate = rateI.value.replace(/[^0-9.]/g,"");
        save(); refreshTotals();
      });
      wrap.querySelector(".stub-delete").addEventListener("click", function(){
        cards = cards.filter(function(x){ return x!==c; });
        save(); render(); animateTotal(total());
      });

      // Swipe right to reveal Delete, swipe left (or tap the row) to close.
      var REVEAL = 92, THRESH = 8, startX = null, startY = null, dragging = false, open = false, curX = 0;
      function setX(x){ curX = x; stub.style.transform = "translateX("+x+"px)"; }
      stub.addEventListener("pointerdown", function(e){
        startX = e.clientX; startY = e.clientY; dragging = false;
        stub.style.transition = "none";
      });
      stub.addEventListener("pointermove", function(e){
        if(startX === null) return;
        var dx = e.clientX - startX, dy = e.clientY - startY;
        if(!dragging){
          if(Math.abs(dx) > THRESH && Math.abs(dx) > Math.abs(dy) + 2){
            dragging = true;
            try{ stub.setPointerCapture(e.pointerId); }catch(_){ }
          } else { return; }
        }
        e.preventDefault();
        var x = (open ? REVEAL : 0) + dx;
        if(x < 0) x = 0; if(x > REVEAL) x = REVEAL;
        setX(x);
      });
      function endDrag(){
        if(startX === null) return;
        var wasDragging = dragging;
        startX = null; startY = null; dragging = false;
        stub.style.transition = "transform .22s cubic-bezier(.2,.8,.2,1)";
        if(!wasDragging) return;          // a tap: leave state, let the input focus
        open = curX > REVEAL * 0.45;
        setX(open ? REVEAL : 0);
      }
      stub.addEventListener("pointerup", endDrag);
      stub.addEventListener("pointercancel", endDrag);

      listEl.appendChild(wrap);
    });
    animateTotal(total());
  }

  document.getElementById("add").addEventListener("click", function(){
    cards.push({id:uid(), name:"New card", points:0, rate:1});
    save(); render();
    var names = listEl.querySelectorAll(".name");
    var last = names[names.length-1];
    if(last){ last.focus(); last.select(); }
  });

  render();
})();
</script>

<script>
/* ---- View switch ---- */
(function(){
  "use strict";
  var tabs = {
    adv:  {btn:document.getElementById("tab-adv"),  view:document.getElementById("view-advisor")},
    calc: {btn:document.getElementById("tab-calc"), view:document.getElementById("view-calc")}
  };
  function show(which){
    Object.keys(tabs).forEach(function(k){
      var t = tabs[k], on = (k===which);
      t.btn.setAttribute("aria-selected", on ? "true" : "false");
      t.view.hidden = !on;
    });
  }
  tabs.adv.btn.addEventListener("click", function(){ show("adv"); });
  tabs.calc.btn.addEventListener("click", function(){ show("calc"); });
})();

/* ---- "Which card?" advisor ---- */
(function(){
  "use strict";

  var CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg>';
  var CHEV  = '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';
  var INFO  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><path d="M12 7.5v.4"/></svg>';

  // Each card earns 4 mpd exactly when earns(a) is true, given the answered
  // attributes a = {channel, fcy, category}. Rules derived from the reference.
  var CARDS = [
    { id:"dbsw", name:"DBS Woman's World",
      earns:function(a){ return a.channel==="online_card" || a.channel==="online_wallet"; } },
    { id:"citi", name:"Citi Rewards",
      earns:function(a){ return a.channel==="online_card" && a.category!=="travel"; } },
    { id:"xl", name:"Maybank XL Rewards",
      earns:function(a){ return a.fcy===true || ["dining","shopping","travel","entertainment"].indexOf(a.category)>=0; } },
    { id:"lady", name:"UOB Lady's / Solitaire",
      earns:function(a){ return a.category==="travel" || a.category==="dining"; } },
    { id:"pref", name:"UOB Preferred Visa",
      earns:function(a){ return a.channel==="instore_contactless"; } },
    { id:"vs", name:"UOB Visa Signature",
      earns:function(a){ return a.fcy===true || a.channel==="instore_contactless"; } }
  ];

  var ATTRS = [
    { key:"channel", q:"How are you paying?", options:[
      {val:"online_card",        label:"Online"},
      {val:"online_wallet",      label:"Apple Pay"},
      {val:"instore_contactless",label:"Contactless"}
    ]},
    { key:"fcy", q:"What currency is it charged in?", options:[
      {val:false, label:"SGD"},
      {val:true,  label:"Foreign currency"}
    ]},
    { key:"category", q:"What are you buying?", options:[
      {val:"travel",        label:"Travel"},
      {val:"dining",        label:"Dining"},
      {val:"shopping",      label:"Shopping"},
      {val:"entertainment", label:"Entertainment"},
      {val:"other",         label:"Something else"}
    ]}
  ];

  var answers = {};   // key -> value
  var order   = [];   // keys in the order they were answered

  // All full attribute assignments consistent with the current answers.
  function completions(ans){
    var res = [{}];
    ATTRS.forEach(function(attr){
      var vals = (attr.key in ans) ? [ans[attr.key]] : attr.options.map(function(o){ return o.val; });
      var next = [];
      res.forEach(function(base){
        vals.forEach(function(v){
          var c = {}; for(var kk in base) c[kk]=base[kk]; c[attr.key]=v; next.push(c);
        });
      });
      res = next;
    });
    return res;
  }

  // "yes" = earns under every consistent completion, "no" = never, "maybe" = depends.
  function cardStatus(card, ans){
    var comps = completions(ans), t=0, f=0;
    comps.forEach(function(a){ if(card.earns(a)) t++; else f++; });
    if(t>0 && f===0) return "yes";
    if(f>0 && t===0) return "no";
    return "maybe";
  }
  function undetermined(ans){ return CARDS.filter(function(c){ return cardStatus(c,ans)==="maybe"; }); }

  // Pick the still-unanswered attribute that resolves the most undetermined cards.
  function pickAttr(ans){
    var open = undetermined(ans);
    if(open.length===0) return null;
    var best=null, bestScore=-1;
    ATTRS.forEach(function(attr){
      if(attr.key in ans) return;
      var total=0;
      attr.options.forEach(function(o){
        var ans2={}; for(var kk in ans) ans2[kk]=ans[kk]; ans2[attr.key]=o.val;
        total += (open.length - undetermined(ans2).length);
      });
      var score = total/attr.options.length;
      if(score>bestScore){ bestScore=score; best=attr; }
    });
    if(!best || bestScore<=0){
      for(var i=0;i<ATTRS.length;i++){ if(!(ATTRS[i].key in ans)) return ATTRS[i]; }
    }
    return best;
  }

  var body = document.getElementById("advisor-body");

  function answer(key,val){
    answers[key]=val;
    if(order.indexOf(key)<0) order.push(key);
    render();
  }
  function restart(){ answers={}; order=[]; render(); }

  function startOverBtn(){
    var b = document.createElement("button");
    b.className = "restart";
    b.type = "button";
    b.textContent = "Start over";
    b.addEventListener("click", restart);
    return b;
  }

  function renderQuestion(attr){
    var frag = document.createDocumentFragment();
    var h = document.createElement("div");
    h.className = "adv-q";
    h.textContent = attr.q;
    frag.appendChild(h);
    var opts = document.createElement("div");
    opts.className = "adv-opts";
    attr.options.forEach(function(o){
      var b = document.createElement("button");
      b.className = "opt";
      b.type = "button";
      b.innerHTML = '<span class="opt-t">'+o.label+'</span>'+CHEV;
      b.addEventListener("click", function(){ answer(attr.key, o.val); });
      opts.appendChild(b);
    });
    frag.appendChild(opts);
    return frag;
  }

  function renderResult(){
    var frag = document.createDocumentFragment();
    var eligible = CARDS.filter(function(c){ return cardStatus(c,answers)==="yes"; });

    if(eligible.length===0){
      var empty = document.createElement("div");
      empty.className = "res-empty";
      empty.innerHTML =
        '<span class="ic">'+INFO+'</span>'+
        '<div>'+
          '<div class="res-empty-t">No bonus card for this</div>'+
          '<div class="res-empty-s">Use your everyday base card.</div>'+
        '</div>';
      frag.appendChild(empty);
    } else {
      var top = document.createElement("div");
      top.className = "res-top";
      top.innerHTML =
        '<span class="res-badge-check">'+CHECK+'</span>'+
        '<div>'+
          '<div class="res-title">Use any of these</div>'+
          '<div class="res-sub">All earn 4 mpd on this spend</div>'+
        '</div>';
      frag.appendChild(top);
      eligible.forEach(function(c){
        var row = document.createElement("div");
        row.className = "res-card";
        row.innerHTML = '<span class="res-dot">'+CHECK+'</span><span class="res-name">'+c.name+'</span>';
        frag.appendChild(row);
      });
    }

    frag.appendChild(startOverBtn());
    return frag;
  }

  function render(){
    body.innerHTML = "";
    var next = pickAttr(answers);
    if(next){
      body.appendChild(renderQuestion(next));
      if(order.length > 0) body.appendChild(startOverBtn());   // nothing to restart on step 1
    } else {
      body.appendChild(renderResult());
    }
  }

  render();
})();
</script>
</body>
</html>
