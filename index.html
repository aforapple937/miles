<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Miles">
<meta name="theme-color" content="#F4F6FA">
<title>KrisFlyer Miles</title>
<style>
  :root{
    --bg:#F4F6FA;
    --surface:#FFFFFF;
    --ink:#101D2E;
    --ink-2:#647587;
    --line:#E6EAF1;
    --gold:#B0821E;
    --gold-bright:#EAC87C;
    --gold-tint:#FFF9EE;
    --gold-soft:#EBD9B0;
    --navy:#0E1B2C;
    --danger:#E4573D;
    --shadow-sm:0 1px 2px rgba(16,29,46,.06),0 2px 6px rgba(16,29,46,.05);
    --shadow-md:0 6px 18px rgba(16,29,46,.10);
    --shadow-lg:0 14px 34px rgba(16,29,46,.16);
    --num:"SFMono-Regular",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    padding:
      calc(env(safe-area-inset-top) + 20px)
      16px
      calc(env(safe-area-inset-bottom) + 40px);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:440px;margin:0 auto}

  /* Top chrome: tab switcher + a separate settings button */
  .chrome{display:flex;align-items:stretch;gap:10px;margin:0 0 22px}
  .gear{
    flex:none;width:52px;border-radius:15px;
    background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-sm);
    display:flex;align-items:center;justify-content:center;color:var(--ink-2);cursor:pointer;
    transition:background .2s,color .2s;
  }
  .gear:active{background:#F0F2F6;color:var(--navy)}
  .gear svg{width:22px;height:22px}

  /* Segmented tab bar — icons only */
  .switch{
    flex:1;display:flex;gap:5px;background:#E7EAF1;border-radius:15px;padding:5px;margin:0;
  }
  .switch button{
    flex:1;display:flex;align-items:center;justify-content:center;
    border:none;background:transparent;border-radius:11px;padding:11px;
    color:var(--ink-2);cursor:pointer;
    transition:background .2s,color .2s,box-shadow .2s;
  }
  .switch button svg{width:23px;height:23px;display:block}
  .switch button[aria-selected="true"]{
    background:var(--surface);color:var(--navy);box-shadow:var(--shadow-sm);
  }
  .switch button:active{color:var(--navy)}
  [hidden]{display:none!important}

  /* Hero board (calculator) */
  .board{
    position:relative;overflow:hidden;
    background:linear-gradient(140deg,#1A2E48 0%,#0E1B2C 72%);
    border-radius:22px;padding:24px 24px 22px;color:#fff;
    box-shadow:var(--shadow-md);
  }
  .board::before{
    content:"";position:absolute;right:-40px;top:-60px;width:210px;height:210px;
    background:radial-gradient(circle,rgba(234,200,124,.22),transparent 70%);
    pointer-events:none;
  }
  .board-label{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#93A6BE}
  .board-total{
    font-family:var(--num);font-size:clamp(44px,14vw,62px);font-weight:600;
    line-height:1.04;letter-spacing:.01em;color:var(--gold-bright);
    margin:8px 0 4px;font-variant-numeric:tabular-nums;
    text-shadow:0 2px 22px rgba(234,200,124,.28);
  }
  .board-sub{font-size:12.5px;color:#93A6BE}
  .board-sub b{color:#fff;font-weight:600}

  .section-head{margin:24px 4px 12px}
  .section-head h2{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-2);
    font-weight:700;margin:0;
  }

  /* Program rows (calculator) */
  .stub{
    display:flex;align-items:stretch;
    background:var(--surface);border:1px solid var(--line);border-radius:16px;
    overflow:hidden;margin-bottom:11px;box-shadow:var(--shadow-sm);
    transition:border-color .2s;
  }
  .stub:focus-within{border-color:var(--gold-soft)}
  .stub-main{flex:1;padding:14px 15px;min-width:0}
  .pname{font-size:16px;font-weight:600;color:var(--ink);padding:2px 0}
  .pfrom{font-size:11.5px;color:var(--ink-2);margin-top:1px}
  .rate-line{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:13px;color:var(--ink-2)}
  .rate-line .x{color:var(--gold);opacity:.8}
  .rate-fixed{font-family:var(--num);font-size:15px;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums}
  .num-in{
    background:#F3F5F9;border:1px solid var(--line);border-radius:9px;
    color:var(--ink);font-family:var(--num);font-size:15px;padding:7px 9px;outline:none;
    min-width:0;font-variant-numeric:tabular-nums;
  }
  .num-in:focus{border-color:var(--gold-soft);background:#fff}
  .pts{width:96px}.unit{font-size:11.5px;color:var(--ink-2)}
  .stub-mi{
    width:100px;flex:none;border-left:1.5px dashed var(--gold-soft);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:8px;gap:3px;background:var(--gold-tint);
  }
  .mi-num{
    font-family:var(--num);font-size:19px;font-weight:700;color:var(--gold);
    font-variant-numeric:tabular-nums;text-align:center;line-height:1.1;word-break:break-all;
  }
  .mi-lbl{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-2)}

  /* Advisor — breadcrumb of previous answers (read-only) */
  .trail{display:flex;flex-wrap:wrap;gap:7px;margin:2px 2px 18px}
  .crumb{
    font-size:12.5px;font-weight:600;color:var(--ink-2);
    background:#E9ECF2;border-radius:999px;padding:6px 13px;
  }

  /* Advisor — questions */
  .adv-q{
    font-size:22px;font-weight:700;color:var(--ink);
    margin:6px 2px 18px;line-height:1.25;letter-spacing:-.01em;
  }
  .adv-opts{display:flex;flex-direction:column;gap:10px}
  .opt{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    width:100%;text-align:left;cursor:pointer;
    background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:17px 18px;box-shadow:var(--shadow-sm);
    transition:transform .12s,box-shadow .2s,border-color .2s;
  }
  .opt:active{transform:scale(.985);box-shadow:var(--shadow-md)}
  .opt-t{font-size:16px;font-weight:600;color:var(--ink)}
  .opt .chev{width:20px;height:20px;color:#B7C1CD;flex:none}

  .restart{
    width:100%;margin-top:16px;background:transparent;border:none;
    color:var(--ink-2);border-radius:12px;padding:12px;font-size:14px;font-weight:600;
    cursor:pointer;transition:background .2s,color .2s;
  }
  .restart:active{background:#E9ECF2;color:var(--ink)}

  .cta{
    width:100%;margin-top:14px;background:var(--navy);color:#fff;border:none;
    border-radius:14px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;
    transition:opacity .2s;
  }
  .cta:active{opacity:.9}

  /* Advisor — result (deliberately distinct from the question cards) */
  .res-top{display:flex;align-items:center;gap:13px;margin:4px 2px 18px}
  .res-badge-check{
    width:46px;height:46px;flex:none;border-radius:50%;
    background:linear-gradient(140deg,#EAC87C,#C79A3E);color:#fff;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 16px rgba(199,154,62,.42);
  }
  .res-badge-check svg{width:25px;height:25px}
  .res-title{font-size:19px;font-weight:700;color:var(--ink);line-height:1.2;letter-spacing:-.01em}
  .res-sub{font-size:13px;color:var(--ink-2);margin-top:2px}

  .res-card{
    background:var(--gold-tint);border:1px solid var(--gold-soft);
    border-radius:15px;margin-bottom:10px;overflow:hidden;
  }
  .res-card-head{
    display:flex;align-items:center;gap:13px;padding:16px 17px;cursor:pointer;
    -webkit-user-select:none;user-select:none;
  }
  .res-card-head:active{background:rgba(199,154,62,.09)}
  .res-dot{
    width:24px;height:24px;flex:none;border-radius:50%;
    background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;
  }
  .res-dot svg{width:15px;height:15px}
  .res-name{font-size:16px;font-weight:700;color:var(--navy)}
  .res-chev{margin-left:auto;width:18px;height:18px;color:var(--gold);flex:none;transition:transform .22s}
  .res-card.open .res-chev{transform:rotate(180deg)}
  .res-details{padding:0 17px 6px}
  .det-row{
    display:flex;align-items:baseline;justify-content:space-between;gap:12px;
    padding:11px 0;border-top:1px solid var(--gold-soft);
  }
  .det-k{font-size:13px;color:var(--ink-2)}
  .det-v{font-size:13px;font-weight:700;color:var(--navy);text-align:right}

  .res-empty{
    display:flex;align-items:center;gap:13px;
    background:var(--surface);border:1px solid var(--line);border-radius:15px;
    padding:18px;box-shadow:var(--shadow-sm);
  }
  .res-empty .ic{
    width:42px;height:42px;flex:none;border-radius:50%;background:#EEF1F6;color:var(--ink-2);
    display:flex;align-items:center;justify-content:center;
  }
  .res-empty .ic svg{width:22px;height:22px}
  .res-empty-t{font-size:15.5px;font-weight:700;color:var(--ink)}
  .res-empty-s{font-size:13px;color:var(--ink-2);margin-top:2px}

  /* Settings — owned cards */
  .set-header{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 20px}
  .set-header h2{font-size:24px;font-weight:700;margin:0;letter-spacing:-.02em;color:var(--ink)}
  .set-done{background:none;border:none;color:var(--gold);font-size:16px;font-weight:700;cursor:pointer;padding:8px 4px}
  .set-done:active{opacity:.55}
  .set-lead{font-size:13.5px;color:var(--ink-2);line-height:1.5;margin:0 2px 20px}
  .set-group{margin-bottom:18px}
  .set-head{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-2);
    font-weight:700;margin:0 4px 9px;
  }
  .set-row{
    display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;text-align:left;
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;box-shadow:var(--shadow-sm);cursor:pointer;margin-bottom:9px;
    transition:border-color .2s,background .2s;
  }
  .set-row:active{background:#FBFCFE}
  .set-name{font-size:15.5px;font-weight:600;color:var(--ink);display:block}
  .set-sub{font-size:12px;color:var(--ink-2);margin-top:2px;display:block}
  .set-check{
    width:26px;height:26px;flex:none;border-radius:50%;border:2px solid #CBD3DD;
    display:flex;align-items:center;justify-content:center;color:transparent;transition:.15s;
  }
  .set-check svg{width:15px;height:15px}
  .set-row.on{border-color:var(--gold-soft)}
  .set-row.on .set-check{background:var(--gold);border-color:var(--gold);color:#fff}
  .set-row.disabled{opacity:.5;cursor:default;box-shadow:none}
  .set-row.sub{margin-left:24px}
  .stmt-row{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:12px 16px;margin-bottom:9px;box-shadow:var(--shadow-sm);
  }
  .stmt-name{font-size:15px;font-weight:600;color:var(--ink)}
  .stmt-sub{font-size:11.5px;color:var(--ink-2);margin-top:2px}
  .stmt-ctl{display:flex;align-items:center;gap:7px;flex:none}
  .stmt-in{width:52px;text-align:center}
  .stmt-unit{font-size:12px;color:var(--ink-2)}
  .disc{
    margin-top:24px;padding:17px 18px;background:#EDF0F5;border-radius:15px;
    font-size:12.5px;line-height:1.55;color:var(--ink-2);
  }
  .disc h3{font-size:13px;font-weight:700;color:var(--ink);margin:0 0 8px;letter-spacing:.01em}
  .disc b{color:var(--ink);font-weight:600}
  .disc ul{margin:9px 0 0;padding-left:17px}
  .disc li{margin-bottom:6px}

  /* FCY split optimiser */
  .sp-back{background:none;border:none;color:var(--gold);font-size:15px;font-weight:700;cursor:pointer;padding:6px 8px 8px 0}
  .sp-back:active{opacity:.6}
  .sp-title{font-size:21px;font-weight:700;color:var(--ink);margin:2px 2px 8px;letter-spacing:-.01em}
  .sp-note{font-size:12.5px;color:var(--ink-2);line-height:1.5;margin:0 2px 16px}
  .sp-note b{color:var(--ink);font-weight:600}
  .sp-row{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
  .sp-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .sp-main{min-width:0}
  .sp-name{font-size:14.5px;font-weight:600;color:var(--ink)}
  .sp-meta{font-size:11px;color:var(--ink-2);margin-top:2px}
  .sp-miles{flex:none;font-family:var(--num);font-weight:700;color:var(--gold);font-size:13px;white-space:nowrap}
  .sp-fields{display:flex;gap:9px;margin-top:11px}
  .sp-field{flex:1;display:flex;flex-direction:column;gap:4px;cursor:text}
  .sp-flabel{font-size:10px;letter-spacing:.03em;color:var(--ink-2);font-weight:600;text-transform:uppercase}
  .sp-in{width:100%;text-align:right}
  .sp-total{display:flex;justify-content:space-between;align-items:center;background:var(--navy);color:#fff;border-radius:15px;padding:15px 17px;margin-top:14px}
  .sp-total .k{font-size:10.5px;color:#93A6BE;text-transform:uppercase;letter-spacing:.12em;font-weight:600}
  .sp-total .sp-amt{font-size:12.5px;color:#B9CADF;margin-top:3px}
  .sp-total .v{font-family:var(--num);font-size:26px;font-weight:700;color:var(--gold-bright);line-height:1}
  .split-btn{width:100%;margin-top:14px;background:var(--gold-tint);border:1px solid var(--gold-soft);color:var(--gold);border-radius:14px;padding:14px;font-size:14.5px;font-weight:700;cursor:pointer;transition:background .2s}
  .split-btn:active{background:#F6ECD6}

  .opt,.restart,.cta,.switch button,.set-row,.gear,.set-done,.split-btn,.sp-back{
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  }
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <div class="chrome">
    <div class="switch" role="tablist" aria-label="View">
      <button id="tab-adv" role="tab" aria-selected="true" aria-controls="view-advisor" aria-label="Which card">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="5" width="19" height="14" rx="3"/><path d="M2.5 9.5h19"/><path d="M6 14.5h4"/></svg>
      </button>
      <button id="tab-calc" role="tab" aria-selected="false" aria-controls="view-calc" aria-label="Calculator">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="2.5" width="15" height="19" rx="3.2"/><rect x="7.6" y="5.4" width="8.8" height="3.4" rx="1.2"/><circle cx="8.4" cy="13" r="1.05" fill="currentColor" stroke="none"/><circle cx="12" cy="13" r="1.05" fill="currentColor" stroke="none"/><circle cx="15.6" cy="13" r="1.05" fill="currentColor" stroke="none"/><circle cx="8.4" cy="17.4" r="1.05" fill="currentColor" stroke="none"/><circle cx="12" cy="17.4" r="1.05" fill="currentColor" stroke="none"/><circle cx="15.6" cy="17.4" r="1.05" fill="currentColor" stroke="none"/></svg>
      </button>
    </div>
    <button class="gear" id="open-set" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.1"/><path d="M19.4 13a1.65 1.65 0 0 0 .33 1.82l.02.02a2 2 0 1 1-2.83 2.83l-.02-.02a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1.08-1.51 1.65 1.65 0 0 0-1.82.33l-.02.02a2 2 0 1 1-2.83-2.83l.02-.02a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1.08 1.65 1.65 0 0 0-.33-1.82l-.02-.02a2 2 0 1 1 2.83-2.83l.02.02a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.02-.02a2 2 0 1 1 2.83 2.83l-.02.02a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <section id="view-advisor" role="tabpanel" aria-labelledby="tab-adv">
    <div id="advisor-body"></div>
  </section>

  <section id="view-calc" role="tabpanel" aria-labelledby="tab-calc" hidden>
    <div class="board">
      <div class="board-label">Total KrisFlyer miles</div>
      <div class="board-total" id="total">0</div>
      <div class="board-sub">across <b id="count">0</b> <span id="cardword">programs</span></div>
    </div>

    <div class="section-head">
      <h2>Points programs</h2>
    </div>

    <div id="list"></div>
  </section>

  <section id="view-settings" role="tabpanel" hidden>
    <div class="set-header">
      <h2>Settings</h2>
      <button class="set-done" id="close-set" type="button">Done</button>
    </div>
    <div id="settings-body"></div>
  </section>

</div>

<script>
(function(){
  "use strict";

  /* ------------------------------------------------------------------ *
   * Data: programs (where points accrue) and cards (what you spend on)  *
   * ------------------------------------------------------------------ */
  var PROGRAMS = {
    krisflyer:{ name:"KrisFlyer", rate:1,   always:true },
    dbs:      { name:"DBS Points",             rate:2 },
    citiTY:   { name:"Citi ThankYou",          rate:0.4 },
    citiMiles:{ name:"Citi Miles",             rate:1 },
    treats:   { name:"Maybank TREATS",         rate:0.4 },
    unis:     { name:"UNI$",                   rate:2 }
  };
  var PROGRAM_ORDER = ["krisflyer","dbs","citiTY","citiMiles","treats","unis"];

  // advisor:true cards carry an earns() rule and appear in "Which card?".
  var CARDS = [
    { id:"dbsw", name:"DBS Woman's World", issuer:"DBS", program:"dbs", advisor:true,
      cap:"S$1,000 / mo", min:"None", cycle:"Calendar (resets 1st)",
      earns:function(a){ return a.channel==="online_card" || a.channel==="online_wallet"; } },
    { id:"citi", name:"Citi Rewards", issuer:"Citi", program:"citiTY", advisor:true,
      cap:"S$1,000 / mo", min:"None", cycle:"Statement", stmt:true, stmtDefault:17,
      earns:function(a){ return a.channel==="online_card" && a.category!=="travel"; } },
    { id:"amaze", name:"Amaze + Citi Rewards", issuer:"Citi", program:"citiTY", advisor:true, requires:"citi",
      cap:"S$1,000 / mo", min:"None", cycle:"Statement", stmt:true,
      earns:function(a){ return a.fcy===true && a.category!=="travel" && (a.channel==="online_card" || a.channel==="instore_contactless"); } },
    { id:"premier", name:"Citi PremierMiles", issuer:"Citi", program:"citiMiles", advisor:false,
      cap:"—", min:"—", cycle:"Statement", stmt:true, stmtDefault:17 },
    { id:"xl", name:"Maybank XL Rewards", issuer:"Maybank", program:"treats", advisor:true,
      cap:"S$1,000 / mo", min:"S$500", cycle:"Calendar (resets 1st)",
      earns:function(a){ return a.fcy===true || ["dining","travel"].indexOf(a.category)>=0; } },
    { id:"world", name:"Maybank World Mastercard", issuer:"Maybank", program:"treats", advisor:false,
      cap:"—", min:"—", cycle:"—" },
    { id:"lady", name:"UOB Lady's Solitaire", issuer:"UOB", program:"unis", advisor:true,
      cap:"S$750 / mo", min:"None", cycle:"Calendar (resets 1st)",
      earns:function(a){ return a.category==="travel" || a.category==="dining"; } },
    { id:"pref", name:"UOB Preferred Visa", issuer:"UOB", program:"unis", advisor:true,
      cap:"S$600 / mo", min:"None", cycle:"Calendar (resets 1st)",
      earns:function(a){ return a.channel==="instore_contactless"; } },
    { id:"vs", name:"UOB Visa Signature", issuer:"UOB", program:"unis", advisor:true,
      cap:"S$1,200 / mo", min:"S$1,000", cycle:"Statement", stmt:true, stmtDefault:13,
      earns:function(a){ return a.fcy===true || a.channel==="instore_contactless"; } }
  ];
  var ISSUERS = ["Citi","DBS","Maybank","UOB"];   // banks ascending
  function cardById(id){ for(var i=0;i<CARDS.length;i++){ if(CARDS[i].id===id) return CARDS[i]; } return null; }
  // Sort key: card name ascending, but a pairing card (Amaze) sorts right under its base card.
  function cardSortKey(c){
    if(c.requires){ var r=cardById(c.requires); return (r?r.name:c.name)+"~"; }
    return c.name;
  }
  function ord(n){ var v=n%100; if(v>=11&&v<=13) return n+"th"; var s=["th","st","nd","rd"]; return n+(s[n%10]||"th"); }
  // A pairing card (Amaze) follows its base card's statement date.
  function stmtDay(c){
    var id = c.requires ? c.requires : c.id;
    if(stmtDays[id]!=null) return stmtDays[id];
    var base = cardById(id);
    return base && base.stmtDefault ? base.stmtDefault : 1;
  }
  function cycleText(c){
    if(c.stmt){ var d=stmtDay(c); return "Statement ("+ord(d)+"–"+(d>1?ord(d-1):"month end")+")"; }
    return c.cycle;
  }

  /* ------------------------------------------------------------------ *

  var OWNED_KEY="miles_owned_v1", BAL_KEY="miles_balances_v1", OLD_KEY="krisflyer_calc_v1", STMT_KEY="miles_stmt_v1";

  function saveOwned(){ try{ localStorage.setItem(OWNED_KEY, JSON.stringify(owned)); }catch(e){ memOwned=owned; } }
  function loadBal(){
    try{ var s=localStorage.getItem(BAL_KEY); if(s) return JSON.parse(s); }catch(e){}

  function milesForProg(pid){ var p=parseFloat(balances[pid])||0; return Math.floor(p*PROGRAMS[pid].rate); }

  function animateTotal(to){
    var n = activePrograms().length;
    countEl.textContent = n;
    cardWord.textContent = n===1 ? "program" : "programs";
    if(reduce){ shown=to; totalEl.textContent=fmt.format(to); return; }
    var from=shown, start=null, dur=480;
    if(raf) cancelAnimationFrame(raf);
    function step(t){
      if(start===null) start=t;
      var k=Math.min(1,(t-start)/dur), e=1-Math.pow(1-k,3);
      totalEl.textContent = fmt.format(Math.round(from+(to-from)*e));
      if(k<1) raf=requestAnimationFrame(step); else shown=to;
    }
    raf=requestAnimationFrame(step);
  }

  /* ------------------------------------------------------------------ *

  var ATTRS = [
    { key:"channel", q:"How are you paying?", options:[
      {val:"instore_contactless",label:"Contactless"},
      {val:"online_card",        label:"Online"},
      {val:"online_wallet",      label:"Apple Pay"}
    ]},
    { key:"fcy", q:"What currency is it charged in?", options:[
      {val:false, label:"SGD"},
      {val:true,  label:"Foreign currency"}
    ]},

    ]}
  ];

  var advBody = document.getElementById("advisor-body");
  var answers = {}, order = [];
  var advScreen = "flow";   // "flow" | "split"
  var alloc = {};           // split-tool allocations, keyed by row id

  function completions(ans){
    var res=[{}];
    ATTRS.forEach(function(attr){
      var vals=(attr.key in ans)?[ans[attr.key]]:attr.options.map(function(o){return o.val;});
      var next=[];
      res.forEach(function(base){ vals.forEach(function(v){ var c={}; for(var kk in base) c[kk]=base[kk]; c[attr.key]=v; next.push(c); }); });
      res=next;
    });
    return res;
  }
  function cardStatus(card,ans){
    var comps=completions(ans), t=0, f=0;
    comps.forEach(function(a){ if(card.earns(a)) t++; else f++; });
    if(t>0&&f===0) return "yes";
    if(f>0&&t===0) return "no";
    return "maybe";
  }
  function undetermined(ans){ return advisorCards().filter(function(c){ return cardStatus(c,ans)==="maybe"; }); }
  function pickAttr(ans){
    var open=undetermined(ans);
    if(open.length===0) return null;
    var best=null, bestScore=-1;
    ATTRS.forEach(function(attr){
      if(attr.key in ans) return;
      var total=0;
      attr.options.forEach(function(o){ var a2={}; for(var kk in ans) a2[kk]=ans[kk]; a2[attr.key]=o.val; total+=(open.length-undetermined(a2).length); });
      var score=total/attr.options.length;
      if(score>bestScore){ bestScore=score; best=attr; }
    });
    if(!best || bestScore<=0){ for(var i=0;i<ATTRS.length;i++){ if(!(ATTRS[i].key in ans)) return ATTRS[i]; } }
    return best;
  }

  function labelFor(key,val){
    for(var i=0;i<ATTRS.length;i++){ if(ATTRS[i].key===key){ var o=ATTRS[i].options; for(var j=0;j<o.length;j++){ if(o[j].val===val) return o[j].label; } } }
    return String(val);
  }
  function renderTrail(){
    if(order.length===0) return null;
    var wrap=document.createElement("div"); wrap.className="trail";
    order.forEach(function(k){ var c=document.createElement("div"); c.className="crumb"; c.textContent=labelFor(k,answers[k]); wrap.appendChild(c); });
    return wrap;
  }
  function answer(key,val){ answers[key]=val; if(order.indexOf(key)<0) order.push(key); renderAdvisor(); }
  function resetAdvisor(){ answers={}; order=[]; advScreen="flow"; alloc={}; }
  function restart(){ resetAdvisor(); renderAdvisor(); }
  function startOverBtn(){
    var b=document.createElement("button"); b.className="restart"; b.type="button"; b.textContent="Start over";
    b.addEventListener("click", restart); return b;
  }
  function renderQuestion(attr){
    var frag=document.createDocumentFragment();
    var h=document.createElement("div"); h.className="adv-q"; h.textContent=attr.q; frag.appendChild(h);
    var opts=document.createElement("div"); opts.className="adv-opts";
    attr.options.forEach(function(o){
      var b=document.createElement("button"); b.className="opt"; b.type="button";
      b.innerHTML='<span class="opt-t">'+o.label+'</span>'+CHEV;
      b.addEventListener("click", function(){ answer(attr.key,o.val); });
      opts.appendChild(b);
    });
    frag.appendChild(opts);
    return frag;
  }
  function renderResult(){
    var frag=document.createDocumentFragment();
    var eligible=advisorCards().filter(function(c){ return cardStatus(c,answers)==="yes"; });
    if(eligible.map(function(c){return c.id;}).indexOf("amaze")>=0){
      eligible=eligible.filter(function(c){ return c.id!=="citi"; });   // Amaze replaces direct Citi
    }
    if(eligible.length===0){

            '<div class="det-row"><span class="det-k">Min. spend</span><span class="det-v">'+c.min+'</span></div>'+

  function setupPrompt(){

  function renderAdvisor(){

  /* ------------------------------------------------------------------ *
   * FCY split optimiser — allocate a chunky foreign-currency spend     *
   * ------------------------------------------------------------------ */
  function openSplit(){ advScreen="split"; alloc={}; renderAdvisor(); }
  function closeSplit(){ advScreen="flow"; renderAdvisor(); }
  function renderSplit(){
    advBody.innerHTML="";
    var back=document.createElement("button"); back.className="sp-back"; back.type="button"; back.innerHTML="&#8249; Back";
    back.addEventListener("click", closeSplit);
    advBody.appendChild(back);
    var title=document.createElement("div"); title.className="sp-title"; title.textContent="Split a large FCY spend";
    advBody.appendChild(title);
    var note=document.createElement("div"); note.className="sp-note";
    note.innerHTML="For each card, split what you'll charge into <b>Bonus</b> (the amount still within your cap this month — you know how much you've already used) and <b>Base</b> (anything over the cap, at 0.4 mpd). The monthly cap is shown as a guide. Maybank World is uncapped: its bonus rate is 2.8 mpd (3.2 mpd once the total ≥ S$4,000).";
    advBody.appendChild(note);

    var elig=advisorCards().filter(function(c){ return cardStatus(c,answers)==="yes"; });
    if(elig.map(function(c){return c.id;}).indexOf("amaze")>=0){ elig=elig.filter(function(c){ return c.id!=="citi"; }); }

    var rows=[];
    var listWrap=document.createElement("div");
    function addRow(key,name,meta,rate,isWorld){
      var row=document.createElement("div"); row.className="sp-row";
      row.innerHTML=
        '<div class="sp-top">'+
          '<div class="sp-main"><div class="sp-name">'+name+'</div><div class="sp-meta">'+meta+'</div></div>'+
          '<div class="sp-miles" data-miles>0 mi</div>'+
        '</div>'+
        '<div class="sp-fields">'+
          '<label class="sp-field"><span class="sp-flabel">Bonus</span><input class="num-in sp-in" data-k="b" inputmode="numeric" placeholder="0" aria-label="'+name+' bonus amount"></label>'+
          '<label class="sp-field"><span class="sp-flabel">Base · 0.4</span><input class="num-in sp-in" data-k="x" inputmode="numeric" placeholder="0" aria-label="'+name+' base amount"></label>'+
        '</div>';
      var bIn=row.querySelector('[data-k="b"]'), xIn=row.querySelector('[data-k="x"]');
      var milesEl=row.querySelector("[data-miles]"), metaEl=row.querySelector(".sp-meta");
      var a=alloc[key]||{}; if(a.b) bIn.value=a.b; if(a.x) xIn.value=a.x;
      function onIn(inp){ inp.value=inp.value.replace(/[^0-9.]/g,""); alloc[key]={b:bIn.value,x:xIn.value}; recompute(); }
      bIn.addEventListener("input", function(){ onIn(bIn); });
      xIn.addEventListener("input", function(){ onIn(xIn); });
      rows.push({key:key,rate:rate,isWorld:!!isWorld,bIn:bIn,xIn:xIn,milesEl:milesEl,metaEl:metaEl});
      listWrap.appendChild(row);
    }
    elig.forEach(function(c){ addRow(c.id, c.name, "4 mpd · cap "+c.cap, 4, false); });
    if(isOwned("world")){ addRow("world","Maybank World Mastercard","2.8 mpd · uncapped",2.8,true); }
    advBody.appendChild(listWrap);

    var tot=document.createElement("div"); tot.className="sp-total";
    tot.innerHTML='<div><div class="k">Total miles</div><div class="sp-amt" data-amt>S$0 allocated</div></div><div class="v" data-tmiles>0</div>';
    advBody.appendChild(tot);
    var amtEl=tot.querySelector("[data-amt]"), tmilesEl=tot.querySelector("[data-tmiles]");

    function recompute(){
      var total=0;
      rows.forEach(function(r){ total += (parseFloat(r.bIn.value)||0)+(parseFloat(r.xIn.value)||0); });
      var worldRate = total>=4000?3.2 : (total>=800?2.8:0.4);
      var tmiles=0;
      rows.forEach(function(r){
        var bv=parseFloat(r.bIn.value)||0, xv=parseFloat(r.xIn.value)||0;
        var rate=r.isWorld?worldRate:r.rate;
        var m=Math.floor(bv*rate + xv*0.4);
        r.milesEl.textContent=fmt.format(m)+" mi";
        tmiles+=m;
        if(r.isWorld) r.metaEl.innerHTML=worldRate+" mpd · uncapped";
      });
      amtEl.textContent="S$"+fmt.format(total)+" allocated";
      tmilesEl.textContent=fmt.format(tmiles);
    }
    recompute();
  }

    // Statement dates — for owned cards on a statement cycle (pairings follow their base card)
    var stmtCards=CARDS.filter(function(c){ return c.stmt && !c.requires && isOwned(c.id); });
    if(stmtCards.length){
      var sg=document.createElement("div"); sg.className="set-group";
      var sh=document.createElement("div"); sh.className="set-head"; sh.textContent="Statement dates"; sg.appendChild(sh);
      stmtCards.forEach(function(c){

          '<div class="stmt-ctl"><input class="num-in stmt-in" inputmode="numeric" aria-label="'+c.name+' statement day"><span class="stmt-unit">of mo</span></div>';
        var input=row.querySelector(".stmt-in");
        input.value=stmtDay(c);
        input.addEventListener("input", function(){
          var v=input.value.replace(/[^0-9]/g,"").slice(0,2); input.value=v;
          if(!v){ delete stmtDays[c.id]; } else { stmtDays[c.id]=Math.min(31,Math.max(1,parseInt(v,10))); }

    disc.innerHTML=
      '<h3>Why only Travel &amp; Dining?</h3>'+
      'MCCs (the category codes banks assign to merchants) are confusing, and you often '+
      'can’t tell which one applies before you pay. To keep this app simple — no '+
      'checking MCCs before every transaction — only <b>Travel</b> and <b>Dining</b> are '+
      'treated as bonus categories. The spending below also earns 4 mpd but is deliberately '+
      'left out of the recommendations:'+
      '<ul>'+
        '<li><b>Citi Rewards</b> — department stores, bags, shoes or clothes</li>'+
        '<li><b>Maybank World Mastercard</b> — petrol, specialty retail &amp; dining</li>'+
        '<li><b>Maybank XL</b> — SGD spending on shopping and entertainment</li>'+
        '<li><b>UOB Preferred Visa</b> — online transactions for department &amp; retail '+
          'stores, supermarkets, dining &amp; food delivery, entertainment &amp; ticketing</li>'+
        '<li><b>UOB Visa Signature</b> — petrol</li>'+
      '</ul>';
    setBody.appendChild(disc);
  }

  /* ------------------------------------------------------------------ *
   * Boot                                                               *
   * ------------------------------------------------------------------ */
  renderCalc();
  renderAdvisor();
  renderSettings();
})();
</script>
</body>
</html>
